<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FitnessTracker — Tips Inbox</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    .inbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .tab-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 0.45rem 1rem;
      border: none;
      border-radius: calc(var(--radius-sm) - 2px);
      background: transparent;
      color: var(--text-2);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .tab-btn.active {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--accent);
    }

    .stat-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-strip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      text-align: center;
    }

    .stat-strip-card__val {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-strip-card__label {
      margin-top: 0.3rem;
      font-size: 0.75rem;
      color: var(--text-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* =======================================================
       ACCORDION CARD
    ======================================================= */

    .rec-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1rem;
      transition: var(--transition);
    }

    .rec-card:hover {
      border-color: var(--border-2);
    }

    .rec-header {
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
    }

    .rec-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 1;
    }

    .rec-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      display: grid;
      place-items: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .rec-title {
      font-family: var(--font-head);
      font-size: 1rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .rec-meta {
      font-size: 0.8rem;
      color: var(--text-3);
    }

    .rec-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .rec-summary {
      text-align: right;
      font-size: 0.82rem;
      color: var(--text-3);
      line-height: 1.6;
    }

    .rec-arrow {
      font-size: 1rem;
      color: var(--text-3);
      transition: transform 0.3s ease;
    }

    .rec-arrow.rotate {
      transform: rotate(180deg);
    }

    .rec-body {
      display: none;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.01);
    }

    .rec-sections {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .rec-section-label {
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .rec-section-label--improve {
      color: #4da3ff;
    }

    .rec-section-label--suggest {
      color: #2dd36f;
    }

    .rec-section-label--safety {
      color: #ff9f43;
    }

    .rec-tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
    }

    .rec-tag {
      padding: 0.7rem 1rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .rec-tag--improve {
      background: rgba(77, 163, 255, 0.12);
      color: #4da3ff;
    }

    .rec-tag--suggest {
      background: rgba(45, 211, 111, 0.12);
      color: #2dd36f;
    }

    .rec-tag--safety {
      background: rgba(255, 159, 67, 0.12);
      color: #ff9f43;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--surface);
      border: 1px dashed var(--border-2);
      border-radius: var(--radius-lg);
    }

    @media (max-width: 768px) {

      .stat-strip {
        grid-template-columns: 1fr;
      }

      .rec-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .rec-right {
        width: 100%;
        justify-content: space-between;
      }

      .rec-summary {
        text-align: left;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar" id="nav"></nav>

  <main class="page">

    <!-- HEADER -->
    <div class="page-header fade-in">
      <h1>TIPS <span>INBOX</span></h1>
      <p>
        Fitness tips and recommendations sent to you by the community.
      </p>
    </div>

    <!-- STATS -->
    <div class="stat-strip fade-in">

      <div class="stat-strip-card">
        <div class="stat-strip-card__val" id="stat-total">0</div>
        <div class="stat-strip-card__label">Tips Received</div>
      </div>

      <div class="stat-strip-card">
        <div class="stat-strip-card__val" id="stat-improvements">0</div>
        <div class="stat-strip-card__label">Improvements</div>
      </div>

      <div class="stat-strip-card">
        <div class="stat-strip-card__val" id="stat-suggestions">0</div>
        <div class="stat-strip-card__label">Suggestions</div>
      </div>

    </div>

    <!-- TABS -->
    <div class="inbox-header fade-in">

      <div class="tab-bar">

        <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">
          All Tips
        </button>

        <button class="tab-btn" id="tab-improvements" onclick="switchTab('improvements')">
          🔵 Improvements
        </button>

        <button class="tab-btn" id="tab-suggestions" onclick="switchTab('suggestions')">
          🟢 Suggestions
        </button>

        <button class="tab-btn" id="tab-safety" onclick="switchTab('safety')">
          🟠 Safety
        </button>

      </div>

      <a href="community.html" class="btn btn--outline">
        💡 Give Tips to Others →
      </a>

    </div>

    <!-- CONTENT -->
    <div id="rec-container">
      <div class="spinner"></div>
    </div>

  </main>

  <script src="app.js"></script>

  <script>

    if (!Auth.require()) throw new Error("Redirecting");

    UI.renderNav("recommendations.html");

    let allRecs = [];

    let activeTab = "all";

    // ======================================================
    // LOAD DATA
    // ======================================================

    async function loadData() {

      try {

        const recs = await RecommendationAPI.getByUser(Auth.userId());

        allRecs = recs || [];

        allRecs.sort(
          (a, b) => new Date(b.createdAt) - new Date(a.createdAt)
        );

        computeStats();

        render();

      } catch (err) {

        document.getElementById("rec-container").innerHTML = `
        <div class="empty-state">
          <p>${err.message}</p>
        </div>
      `;
      }
    }

    // ======================================================
    // STATS
    // ======================================================

    function computeStats() {

      document.getElementById("stat-total").textContent =
        allRecs.length;

      document.getElementById("stat-improvements").textContent =
        allRecs.reduce(
          (sum, r) => sum + (r.improvements?.length || 0),
          0
        );

      document.getElementById("stat-suggestions").textContent =
        allRecs.reduce(
          (sum, r) => sum + (r.suggestions?.length || 0),
          0
        );
    }

    // ======================================================
    // TABS
    // ======================================================

    function switchTab(tab) {

      activeTab = tab;

      ["all", "improvements", "suggestions", "safety"]
        .forEach(t => {

          document
            .getElementById(`tab-${t}`)
            .classList.toggle("active", t === tab);

        });

      render();
    }

    // ======================================================
    // ACCORDION
    // ======================================================

    function toggleAccordion(id) {

      const body =
        document.getElementById(`body-${id}`);

      const arrow =
        document.getElementById(`arrow-${id}`);

      if (!body) return;

      const isOpen =
        body.style.display === "block";

      body.style.display =
        isOpen ? "none" : "block";

      arrow.classList.toggle("rotate", !isOpen);
    }

    // ======================================================
    // RENDER
    // ======================================================

    function render() {

      let list = [...allRecs];

      if (activeTab === "improvements") {
        list = list.filter(r => r.improvements?.length);
      }

      else if (activeTab === "suggestions") {
        list = list.filter(r => r.suggestions?.length);
      }

      else if (activeTab === "safety") {
        list = list.filter(r => r.safety?.length);
      }

      const container =
        document.getElementById("rec-container");

      if (!list.length) {

        container.innerHTML = `
        <div class="empty-state">
          <h3>No Recommendations Found</h3>
        </div>
      `;

        return;
      }

      // ====================================================
      // GROUP BY ACTIVITY
      // ====================================================

      const grouped = {};

      list.forEach((rec) => {

        const key = rec.activityId || rec.id;

        if (!grouped[key]) {

          grouped[key] = {

            key: key,

            activityType:
              rec.activityType || "WORKOUT",

            recs: []
          };
        }

        grouped[key].recs.push(rec);
      });

      // ====================================================
      // HTML
      // ====================================================

      container.innerHTML = Object.values(grouped)
        .map(group => {

          // Count totals across all recs in this group
          let totalImprovements = 0;
          let totalSuggestions = 0;
          let totalSafety = 0;

          group.recs.forEach(r => {
            totalImprovements += (r.improvements?.length || 0);
            totalSuggestions += (r.suggestions?.length || 0);
            totalSafety += (r.safety?.length || 0);
          });

          const activityLabel = String(group.activityType)
            .replaceAll("_", " ")
            .toUpperCase();

          return `

        <div class="rec-card fade-in">

          <!-- HEADER -->

          <div class="rec-header"
               onclick="toggleAccordion('${group.key}')">

            <div class="rec-left">

              <div class="rec-icon">
                ${UI.activityIcon(group.activityType)}
              </div>

              <div>

                <div class="rec-title">
                  ${activityLabel}
                </div>

                <div class="rec-meta">
                  ${group.recs.length} recommendation${group.recs.length > 1 ? 's' : ''}
                </div>

              </div>

            </div>

            <div class="rec-right">

              <div class="rec-summary">

                🔵 ${totalImprovements} Improvements
                <br>

                🟢 ${totalSuggestions} Suggestions
                <br>

                🟠 ${totalSafety} Safety

              </div>

              <div class="rec-arrow"
                   id="arrow-${group.key}">
                ▼
              </div>

            </div>

          </div>

          <!-- BODY -->

          <div class="rec-body"
               id="body-${group.key}">

            <div class="rec-sections">

              ${group.recs.map((rec, idx) => `

                <div style="padding-bottom:1rem;${idx > 0 ? 'border-top:1px solid var(--border);padding-top:1rem;' : ''}">

                  <div style="font-size:0.78rem;color:var(--text-3);margin-bottom:0.75rem;">
                    Tip #${idx + 1} — ${UI.formatDate(rec.createdAt)}
                  </div>

                  ${rec.improvements?.length ? `

                    <div style="margin-bottom:0.75rem;">

                      <div class="rec-section-label rec-section-label--improve">
                        🔵 Improvements
                      </div>

                      <div class="rec-tag-list">

                        ${rec.improvements.map(item => `

                          <span class="rec-tag rec-tag--improve">
                            ${item}
                          </span>

                        `).join("")}

                      </div>

                    </div>

                  ` : ""}

                  ${rec.suggestions?.length ? `

                    <div style="margin-bottom:0.75rem;">

                      <div class="rec-section-label rec-section-label--suggest">
                        🟢 Suggestions
                      </div>

                      <div class="rec-tag-list">

                        ${rec.suggestions.map(item => `

                          <span class="rec-tag rec-tag--suggest">
                            ${item}
                          </span>

                        `).join("")}

                      </div>

                    </div>

                  ` : ""}

                  ${rec.safety?.length ? `

                    <div>

                      <div class="rec-section-label rec-section-label--safety">
                        🟠 Safety Notes
                      </div>

                      <div class="rec-tag-list">

                        ${rec.safety.map(item => `

                          <span class="rec-tag rec-tag--safety">
                            ${item}
                          </span>

                        `).join("")}

                      </div>

                    </div>

                  ` : ""}

                </div>

              `).join("")}

            </div>

          </div>

        </div>

      `;

        }).join("");
    }

    // ======================================================
    // INIT
    // ======================================================

    loadData();

  </script>

</body>

</html>
