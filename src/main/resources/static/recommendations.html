<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitnessTacker — Tips Inbox</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .inbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .tab-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      gap: 4px;
    }
    .tab-btn {
      padding: 0.45rem 1.1rem;
      border-radius: calc(var(--radius-sm) - 2px);
      border: none;
      background: transparent;
      color: var(--text-2);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--surface-2);
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .filter-bar label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      white-space: nowrap;
    }
    .filter-select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      cursor: pointer;
      flex: 1;
      min-width: 180px;
    }
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-strip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      text-align: center;
    }
    .stat-strip-card__val {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--accent);
    }
    .stat-strip-card__label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 0.2rem;
    }
    .rec-inbox-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: border-color var(--transition);
    }
    .rec-inbox-card:hover { border-color: var(--border-2); }
    .rec-inbox-card__top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .rec-inbox-card__activity {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .rec-inbox-card__icon {
      font-size: 1.8rem;
      width: 48px; height: 48px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .rec-inbox-card__type {
      font-family: var(--font-head);
      font-size: 1.05rem;
      letter-spacing: 0.05em;
    }
    .rec-inbox-card__meta { font-size: 0.78rem; color: var(--text-3); margin-top: 0.2rem; }
    .rec-inbox-card__date { font-size: 0.75rem; color: var(--text-3); white-space: nowrap; flex-shrink: 0; }
    .rec-sections { display: flex; flex-direction: column; gap: 0.75rem; }
    .empty-inbox {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--surface);
      border: 1px dashed var(--border-2);
      border-radius: var(--radius-lg);
    }
    .empty-inbox__icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-inbox__title {
      font-family: var(--font-head);
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .empty-inbox__sub { font-size: 0.875rem; color: var(--text-3); margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<nav class="navbar" id="nav"></nav>

<main class="page">

  <div class="page-header fade-in">
    <h1>TIPS <span>INBOX</span></h1>
    <p>Fitness tips and recommendations sent to you by the community.</p>
  </div>

  <!-- Stats -->
  <div class="stat-strip fade-in">
    <div class="stat-strip-card">
      <div class="stat-strip-card__val" id="stat-total">—</div>
      <div class="stat-strip-card__label">Tips Received</div>
    </div>
    <div class="stat-strip-card">
      <div class="stat-strip-card__val" id="stat-improvements">—</div>
      <div class="stat-strip-card__label">Improvements</div>
    </div>
    <div class="stat-strip-card">
      <div class="stat-strip-card__val" id="stat-suggestions">—</div>
      <div class="stat-strip-card__label">Suggestions</div>
    </div>
  </div>

  <!-- Tabs + CTA -->
  <div class="inbox-header fade-in">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-all"
              onclick="switchTab('all')">All Tips</button>
      <button class="tab-btn" id="tab-improvements"
              onclick="switchTab('improvements')">🔵 Improvements</button>
      <button class="tab-btn" id="tab-suggestions"
              onclick="switchTab('suggestions')">🟢 Suggestions</button>
      <button class="tab-btn" id="tab-safety"
              onclick="switchTab('safety')">🟠 Safety</button>
    </div>
    <a href="community.html" class="btn btn--outline">💡 Give Tips to Others →</a>
  </div>

  <!-- Activity Filter (shown once data loads) -->
  <div class="filter-bar fade-in" id="filter-bar" style="display:none">
    <label>Filter by Activity</label>
    <select class="filter-select" id="filter-activity" onchange="applyFilter()">
      <option value="">All Activities</option>
    </select>
    <button class="btn btn--ghost btn--sm" onclick="clearFilter()">Clear</button>
  </div>

  <!-- List -->
  <div id="rec-container">
    <div class="spinner"></div>
  </div>

</main>

<script src="app.js"></script>
<script>
  if (!Auth.require()) throw new Error("Redirecting");
  UI.renderNav("recommendations.html");

  let allRecs   = [];
  let activeTab = "all";
  let filterActId = "";

  // ── Load ──────────────────────────────────────────────────
  async function loadRecs() {
    try {
      allRecs = await RecommendationAPI.getByUser(Auth.userId());
      allRecs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      computeStats();
      populateFilter();
      render();
    } catch (err) {
      document.getElementById("rec-container").innerHTML =
        `<p style="color:var(--accent-err);font-size:0.875rem">${err.message}</p>`;
    }
  }

  function computeStats() {
    document.getElementById("stat-total").textContent =
      allRecs.length;
    document.getElementById("stat-improvements").textContent =
      allRecs.reduce((s, r) => s + (r.improvements?.length || 0), 0);
    document.getElementById("stat-suggestions").textContent =
      allRecs.reduce((s, r) => s + (r.suggestions?.length  || 0), 0);
  }

  function populateFilter() {
    const seen = new Set();
    const sel  = document.getElementById("filter-activity");
    allRecs.forEach(r => {
      if (r.activityId && !seen.has(r.activityId)) {
        seen.add(r.activityId);
        const type = r.type || "OTHERS";
        const opt  = document.createElement("option");
        opt.value  = r.activityId;
        opt.textContent =
          `${UI.activityIcon(type)} ${type.replace("_"," ")} (${r.activityId.slice(0,8)}…)`;
        sel.appendChild(opt);
      }
    });
    if (seen.size > 0) document.getElementById("filter-bar").style.display = "flex";
  }

  function switchTab(tab) {
    activeTab = tab;
    ["all","improvements","suggestions","safety"].forEach(t =>
      document.getElementById(`tab-${t}`).classList.toggle("active", t === tab)
    );
    render();
  }

  function applyFilter() {
    filterActId = document.getElementById("filter-activity").value;
    render();
  }
  function clearFilter() {
    document.getElementById("filter-activity").value = "";
    filterActId = "";
    render();
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    let list = [...allRecs];
    if (filterActId) list = list.filter(r => r.activityId === filterActId);
    if (activeTab === "improvements") list = list.filter(r => r.improvements?.length);
    else if (activeTab === "suggestions") list = list.filter(r => r.suggestions?.length);
    else if (activeTab === "safety") list = list.filter(r => r.safety?.length);

    const container = document.getElementById("rec-container");
    if (!list.length) {
      container.innerHTML = `
        <div class="empty-inbox">
          <div class="empty-inbox__icon">${allRecs.length === 0 ? "📭" : "🔍"}</div>
          <div class="empty-inbox__title">
            ${allRecs.length === 0 ? "NO TIPS YET" : "NOTHING MATCHES"}
          </div>
          <p class="empty-inbox__sub">
            ${allRecs.length === 0
              ? "You haven't received any tips from the community yet.<br>Log some activities so others can see your workouts!"
              : "No tips match this filter. Try a different one."}
          </p>
          ${allRecs.length === 0
            ? `<a href="activities.html" class="btn btn--primary" style="margin-right:0.5rem">Log Activity</a>
               <a href="community.html"  class="btn btn--outline">Browse Community</a>`
            : `<button class="btn btn--ghost"
                       onclick="clearFilter();switchTab('all')">Clear Filters</button>`}
        </div>`;
      return;
    }

    container.innerHTML = list.map(r => {
      const type         = r.type || r.activityType || "OTHERS";
      const improvements = r.improvements || [];
      const suggestions  = r.suggestions  || [];
      const safety       = r.safety       || [];
      const hasContent   = improvements.length || suggestions.length || safety.length;

      return `
        <div class="rec-inbox-card fade-in">
          <div class="rec-inbox-card__top">
            <div class="rec-inbox-card__activity">
              <div class="rec-inbox-card__icon">${UI.activityIcon(type)}</div>
              <div>
                <div class="rec-inbox-card__type">${type.replace("_"," ")}</div>
                <div class="rec-inbox-card__meta">
                  Activity · ${r.activityId?.slice(0,12) || "—"}…
                </div>
              </div>
            </div>
            <div class="rec-inbox-card__date">${UI.formatDate(r.createdAt)}</div>
          </div>

          ${hasContent ? `
            <div class="rec-sections">
              ${improvements.length ? `
                <div>
                  <div class="rec-section-label rec-section-label--improve">
                    🔵 Improvements (${improvements.length})
                  </div>
                  <div class="rec-tag-list">
                    ${improvements.map(i =>
                      `<span class="rec-tag rec-tag--improve">${i}</span>`).join("")}
                  </div>
                </div>` : ""}
              ${suggestions.length ? `
                <div>
                  <div class="rec-section-label rec-section-label--suggest">
                    🟢 Suggestions (${suggestions.length})
                  </div>
                  <div class="rec-tag-list">
                    ${suggestions.map(s =>
                      `<span class="rec-tag rec-tag--suggest">${s}</span>`).join("")}
                  </div>
                </div>` : ""}
              ${safety.length ? `
                <div>
                  <div class="rec-section-label rec-section-label--safety">
                    🟠 Safety Notes (${safety.length})
                  </div>
                  <div class="rec-tag-list">
                    ${safety.map(s =>
                      `<span class="rec-tag rec-tag--safety">${s}</span>`).join("")}
                  </div>
                </div>` : ""}
            </div>
          ` : `<p style="font-size:0.82rem;color:var(--text-3);font-style:italic">
                 No tag details stored for this tip.
               </p>`}
        </div>`;
    }).join("");
  }

  loadRecs();
</script>
</body>
</html>
